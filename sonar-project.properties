sonar.projectKey=siddheshafc_GitHub-Actions-CI-CD-pipeline
sonar.organization=siddheshdhurii

sonar.projectName=Todo App

# Analyze both workspaces from the monorepo root
sonar.sources=backend/src,frontend/src
sonar.tests=backend/tests,frontend/src/tests
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.js,**/*.test.jsx

# Pre-generated coverage reports (produced by `npm test` in CI before this
# scan runs - see .github/workflows/ci.yml)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

sonar.sourceEncoding=UTF-8
