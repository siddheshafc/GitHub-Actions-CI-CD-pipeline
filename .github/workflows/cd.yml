name: CD Workflow

on:
  workflow_run:
    workflows: ["CI Workflow"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (defaults to latest main commit)'
        required: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECS_CLUSTER: todo-app-cluster
  ECS_SERVICE: todo-app-service
  CONTAINER_NAME: todo-app

jobs:
  deploy:
    name: Deploy to ECS Fargate
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image tag
        id: image
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
            TAG="sha-${SHA:0:12}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Look up ECR registry
        id: ecr
        run: |
          echo "registry=$(aws ecr describe-repositories \
            --repository-names todo-app \
            --query 'repositories[0].repositoryUri' --output text | cut -d/ -f1)" >> "$GITHUB_OUTPUT"

      
      - name: Record current (previous) task definition
        id: previous
        run: |
          CURRENT_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' --output text)
          echo "arn=$CURRENT_TASK_DEF_ARN" >> "$GITHUB_OUTPUT"
          echo "Previous task definition: $CURRENT_TASK_DEF_ARN"

      - name: Render new task definition with updated image
        id: render
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_SERVICE" \
            --query 'taskDefinition' > current-task-def.json

          NEW_IMAGE="${{ steps.ecr.outputs.registry }}/todo-app:${{ steps.image.outputs.tag }}"

          jq --arg IMAGE "$NEW_IMAGE" --arg NAME "$CONTAINER_NAME" '
            .containerDefinitions |= map(
              if .name == $NAME then .image = $IMAGE else . end
            )
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)
          ' current-task-def.json > new-task-def.json

          echo "image=$NEW_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Register new task definition revision
        id: register
        run: |
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service (rolling deployment)
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.register.outputs.arn }}" \
            --force-new-deployment

      - name: Wait for service to stabilize
        id: wait
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

      - name: Smoke test /health via the load balancer
        id: smoke
        run: |
          ALB_DNS="${{ secrets.ALB_DNS_NAME }}"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "http://${ALB_DNS}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: got status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after retries"
          exit 1

      - name: Roll back to previous task definition
        if: failure() && steps.previous.outputs.arn != ''
        run: |
          echo "Deployment failed - rolling back to ${{ steps.previous.outputs.arn }}"
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.previous.outputs.arn }}" \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
          echo "::error::Deployment failed and was rolled back to the previous task definition."
